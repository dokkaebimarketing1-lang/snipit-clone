<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snipit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo"></div>
      <h1>스니핏</h1>
    </div>

    <div id="login-section" class="section">
      <p class="desc">로그인하여 레퍼런스를 저장하세요</p>
      <button id="login-btn" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.76h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.76c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google로 로그인
      </button>
    </div>

    <div id="boards-section" class="section hidden">
      <div class="user-info">
        <img id="user-avatar" class="avatar" src="" alt="">
        <span id="user-name"></span>
      </div>
      <h2>보드 선택</h2>
      <div id="boards-list" class="boards-list">
        <div class="loading">보드를 불러오는 중...</div>
      </div>
      <button id="save-btn" class="btn btn-primary" disabled>선택한 보드에 저장</button>
      <button id="logout-btn" class="btn btn-text">로그아웃</button>
    </div>

    <div id="contribute-section" class="section hidden">
      <div class="contribute-header">
        <span class="contribute-icon">🤝</span>
        <h2>레퍼런스 기여</h2>
      </div>
      <p class="desc">Meta Ad Library를 구경할 때 보이는 광고 정보가 스니핏 데이터베이스에 공유됩니다.</p>
      <p class="desc contribute-benefit">✨ 기여 보상: 프리미엄 검색 무료 이용</p>
      <div class="contribute-stats">
        <span>이번 달 기여: <strong id="contribute-count">0</strong>개</span>
      </div>
      <div class="contribute-toggle">
        <label class="switch">
          <input type="checkbox" id="contribute-toggle">
          <span class="slider"></span>
        </label>
        <span id="contribute-status">기여 비활성</span>
      </div>
    </div>

    <div id="status-section" class="section hidden">
      <div id="status-message" class="status"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
